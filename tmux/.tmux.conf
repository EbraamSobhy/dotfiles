# Status bar background and text color
set -g status-style "bg=#000000,fg=#FFFFFF"

# Left section
set -g status-left "#[bg=#000000,fg=#FFFFFF] [#S] "

# Right section
set -g status-right "#[bg=#000000,fg=#FFFFFF] %Y-%m-%d %H:%M "

# Window list styling
set -g window-status-style "bg=#000000,fg=#FFFFFF"
set -g window-status-current-style "bg=#000000,fg=#FFFFFF,bold"

bind -n C-Right next-window
bind -n C-Left previous-window
